components:
  schemas:
    analytics-service_cluster_file.Bucket:
      enum:
      - images
      - documents
      type: string
      x-enum-varnames:
      - BucketImages
      - BucketDocuments
    analytics-service_cluster_file.File:
      properties:
        Bucket:
          $ref: '#/components/schemas/analytics-service_cluster_file.Bucket'
        FileName:
          type: string
        FileSize:
          type: integer
        ID:
          type: integer
        URL:
          type: string
      type: object
    analytics-service_service_analytics.Report:
      properties:
        CreatedAt:
          type: string
        Files:
          items:
            $ref: '#/components/schemas/analytics-service_cluster_file.File'
          type: array
          uniqueItems: false
        ID:
          type: integer
        PeriodEnd:
          type: string
        PeriodStart:
          type: string
        Type:
          $ref: '#/components/schemas/analytics-service_service_analytics.ReportType'
      type: object
    analytics-service_service_analytics.ReportType:
      enum:
      - 0
      - 1
      type: integer
      x-enum-varnames:
      - ReportTypeUnknown
      - ReportTypeBasic
    gorouter.ErrorInfo:
      properties:
        code:
          type: string
        message:
          type: string
      type: object
    gorouter.ErrorResponse:
      properties:
        error:
          $ref: '#/components/schemas/gorouter.ErrorInfo'
      type: object
externalDocs:
  description: ""
  url: ""
info:
  description: API for generating and listing analytics reports.
  title: Analytics Service API
  version: "1.0"
openapi: 3.1.0
paths:
  /reports:
    get:
      description: Returns all generated analytics reports.
      parameters:
      - description: Maximum number of items to return; 0 means no limit
        in: query
        name: limit
        schema:
          type: integer
      - description: Number of items to skip
        in: query
        name: offset
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/analytics-service_service_analytics.Report'
                type: array
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Internal Server Error
      summary: List reports
      tags:
      - reports
  /reports/basic/{periodStart}/{periodEnd}:
    post:
      description: Generates a basic analytics report for the inclusive date period.
      parameters:
      - description: Period start date in YYYY-MM-DD format
        in: path
        name: periodStart
        required: true
        schema:
          type: string
      - description: Period end date in YYYY-MM-DD format
        in: path
        name: periodEnd
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analytics-service_service_analytics.Report'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gorouter.ErrorResponse'
          description: Internal Server Error
      summary: Create basic report
      tags:
      - reports
servers:
- url: /api/analytics-service
